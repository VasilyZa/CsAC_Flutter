name: Manual Build

on:
  workflow_dispatch:
    inputs:
      artifact:
        description: Artifact to build
        required: true
        default: all
        type: choice
        options:
          - all
          - windows-exe
          - windows-installer
          - linux
          - android-apk

permissions:
  contents: read

env:
  APP_NAME: csac
  FLUTTER_VERSION: "3.44.0"

jobs:
  windows:
    name: Windows
    if: ${{ github.event.inputs.artifact == 'all' || github.event.inputs.artifact == 'windows-exe' || github.event.inputs.artifact == 'windows-installer' }}
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Package Windows portable bundle
        if: ${{ github.event.inputs.artifact == 'all' || github.event.inputs.artifact == 'windows-exe' }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build/artifacts | Out-Null
          Compress-Archive `
            -Path build/windows/x64/runner/Release/* `
            -DestinationPath build/artifacts/${{ env.APP_NAME }}-windows-x64.zip `
            -Force

      - name: Upload Windows portable bundle
        if: ${{ github.event.inputs.artifact == 'all' || github.event.inputs.artifact == 'windows-exe' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-windows-x64
          path: build/artifacts/${{ env.APP_NAME }}-windows-x64.zip
          if-no-files-found: error

      - name: Install Inno Setup
        if: ${{ github.event.inputs.artifact == 'all' || github.event.inputs.artifact == 'windows-installer' }}
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        if: ${{ github.event.inputs.artifact == 'all' || github.event.inputs.artifact == 'windows-installer' }}
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build/installer | Out-Null
          $buildDir = Join-Path $PWD "build\windows\x64\runner\Release"
          $outputDir = Join-Path $PWD "build\installer"
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            "/DBuildDir=$buildDir" `
            "/DOutputDir=$outputDir" `
            ".github\installer\windows\csac.iss"

      - name: Upload Windows installer
        if: ${{ github.event.inputs.artifact == 'all' || github.event.inputs.artifact == 'windows-installer' }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-windows-x64-setup
          path: build/installer/${{ env.APP_NAME }}-windows-x64-setup.exe
          if-no-files-found: error

  linux:
    name: Linux
    if: ${{ github.event.inputs.artifact == 'all' || github.event.inputs.artifact == 'linux' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang \
            cmake \
            libgtk-3-dev \
            liblzma-dev \
            ninja-build \
            pkg-config

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Get dependencies
        run: flutter pub get

      - name: Build Linux release
        run: flutter build linux --release

      - name: Package Linux bundle
        run: |
          mkdir -p build/artifacts
          tar -C build/linux/x64/release -czf build/artifacts/${APP_NAME}-linux-x64.tar.gz bundle

      - name: Upload Linux bundle
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-linux-x64
          path: build/artifacts/${{ env.APP_NAME }}-linux-x64.tar.gz
          if-no-files-found: error

  android:
    name: Android
    if: ${{ github.event.inputs.artifact == 'all' || github.event.inputs.artifact == 'android-apk' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Build Android APK
        run: flutter build apk --release

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-android-release-apk
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-release.apk.sha1
          if-no-files-found: error
